<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Swamp Sheet</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F2EEE8;--surface:#FFFFFF;--olive:#4A5740;--olive-mid:#6B7A5F;--olive-pale:#EDF0EA;
  --bala:#8B1A1A;--red:#C0392B;--gold:#D4A017;--black:#1C1C1C;--gray:#6B6B6B;
  --gray-lt:#B0B0B0;--border:#E4E0D8;--border-strong:#C8C0B0;
  --ff-title:'Bebas Neue',Impact,sans-serif;--ff-body:'Outfit',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--ff-body);color:var(--black);font-size:16px}
#app{display:none;flex-direction:column;height:100dvh;max-width:430px;margin:0 auto;background:var(--bg)}
header{background:transparent;padding:12px 16px 8px;flex-shrink:0}
.hdr-inner{display:flex;align-items:center;gap:10px}
.swamp-flag{height:44px;width:auto;object-fit:contain;flex-shrink:0}
.hdr-text{flex:1;min-width:0}
.app-title{font-family:var(--ff-title);font-size:30px;color:var(--olive);letter-spacing:1.5px;line-height:1;display:block}
.course-subtitle{font-size:11px;font-weight:500;color:var(--gray);letter-spacing:0.2px;margin-top:1px;display:block}
.hdr-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
.admin-btn{background:rgba(74,87,64,0.12);color:var(--gray);border:1.5px solid var(--border);border-radius:20px;padding:5px 10px;font-family:var(--ff-body);font-size:10px;font-weight:700;cursor:pointer;letter-spacing:0.5px;text-transform:uppercase;transition:all 0.2s}
.admin-btn.active{background:var(--red);color:#fff;border-color:var(--red)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--olive);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid var(--border);overflow:hidden;flex-shrink:0}
.user-avatar img{width:100%;height:100%;object-fit:cover}
.user-menu{position:fixed;top:62px;right:16px;background:#fff;border:1px solid var(--border);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,0.12);z-index:200;min-width:160px;overflow:hidden;display:none}
.user-menu.open{display:block}
.user-menu-header{padding:10px 14px 8px;border-bottom:1px solid var(--border)}
.user-menu-name{font-size:13px;font-weight:600;color:var(--black)}
.user-menu-hdcp{font-size:11px;color:var(--gray);margin-top:2px}
.user-menu-btn{width:100%;padding:10px 14px;background:none;border:none;font-family:var(--ff-body);font-size:13px;color:var(--gray);text-align:left;cursor:pointer;display:block}
.user-menu-btn:active{background:var(--olive-pale)}
main{flex:1;overflow:hidden;position:relative}
.tab-panel{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px 24px;display:none}
.tab-panel.active{display:block}
.bottom-nav{display:flex;background:var(--surface);border-top:2px solid var(--border-strong);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0)}
.nav-btn{flex:1;padding:9px 4px 7px;border:none;background:none;font-family:var(--ff-body);font-size:10px;font-weight:500;color:var(--gray-lt);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color 0.15s}
.nav-btn.active{color:var(--olive)}
.nav-icon{font-size:19px;line-height:1;transition:transform 0.15s}
.nav-btn.active .nav-icon{transform:scale(1.1)}
.card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:11px;box-shadow:0 1px 4px rgba(28,28,28,0.08),0 0 0 1px var(--border)}
.section-title{font-family:var(--ff-title);font-size:18px;letter-spacing:0.8px;color:var(--black);margin-bottom:11px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:11px}
.stat-card{background:var(--surface);border-radius:10px;padding:10px 6px 11px;text-align:center;box-shadow:0 1px 4px rgba(28,28,28,0.07),0 0 0 1px var(--border);display:flex;flex-direction:column;align-items:center}
.stat-val{display:block;font-size:20px;font-weight:700;color:var(--olive);line-height:1}
.stat-na{color:var(--gray-lt);font-size:14px}
.stat-lbl{display:block;font-size:9px;font-weight:600;color:var(--gray);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.4px}
.stat-emoji{display:block;font-size:15px;line-height:1.2;color:var(--black)}
.goal-card{background:var(--olive);border-radius:12px;padding:15px 16px;margin-bottom:11px;display:flex;align-items:center;gap:14px}
.goal-left{flex:1;min-width:0}
.goal-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:2px}
.goal-score{font-family:var(--ff-title);font-size:46px;color:var(--surface);line-height:1;letter-spacing:1px}
.goal-date{font-size:11px;color:rgba(255,255,255,0.65);margin-top:3px}
.goal-avg{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px}
.goal-divider{width:1px;height:52px;background:rgba(255,255,255,0.2);flex-shrink:0}
.goal-right{text-align:center;flex-shrink:0;min-width:80px}
.goal-to-go-num{font-family:var(--ff-title);font-size:42px;color:var(--gold);line-height:1;letter-spacing:1px}
.goal-to-go-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,0.6);text-transform:uppercase;letter-spacing:0.8px;margin-top:3px}
.goal-to-go-sub{font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px}
.round-row{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border);gap:10px;cursor:pointer}
.round-row:last-child{border-bottom:none;padding-bottom:0}
.round-date{width:38px;flex-shrink:0;text-align:center}
.r-day{font-size:20px;font-weight:700;color:var(--olive);line-height:1}
.r-mon{font-size:9px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px}
.round-info{flex:1;min-width:0}
.r-course-nm{font-size:11px;font-weight:600;color:var(--olive-mid);text-transform:uppercase;letter-spacing:0.3px;margin-bottom:1px}
.r-over-lg{font-size:17px;font-weight:700;line-height:1}
.r-net-lbl{font-size:11px;color:var(--gray);margin-top:3px;font-weight:500}
.round-score{text-align:right;flex-shrink:0}
.r-gross{font-size:22px;font-weight:700;color:var(--black);line-height:1}
.over-red{color:var(--red)}.over-green{color:var(--olive)}
.sc-mini{display:grid;grid-template-columns:repeat(9,1fr);gap:3px;padding:8px 0 4px;border-top:1px solid var(--border);margin-top:6px}
.sc-cell{text-align:center}
.sc-h{font-size:8px;color:var(--gray-lt);font-weight:500}
.sc-s{font-size:12px;font-weight:700;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;margin:2px auto}
.sc-p{font-size:8px;color:var(--gray-lt)}
.s-eagle{background:var(--gold);color:#fff}.s-birdie{background:var(--olive);color:#fff}
.s-par{background:#EBEBEB;color:#555}.s-bogey{background:#FDECEA;color:var(--red)}
.s-double{background:var(--red);color:#fff}.s-worse{background:var(--bala);color:#fff}
.round-meta{display:flex;gap:6px;flex-wrap:wrap;padding:5px 0 2px;font-size:11px;color:var(--gray)}
.process-mini{background:var(--olive-pale);border-radius:6px;padding:6px 8px;margin-top:5px;margin-bottom:4px}
.process-mini-row{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.process-mini-row:last-child{margin-bottom:0}
.process-mini-lbl{font-size:10px;font-weight:700;color:var(--olive);width:72px;flex-shrink:0}
.process-mini-val{font-size:11px;color:var(--black);flex:1}
.notes-section{margin-top:8px}
.notes-summary-box{background:var(--olive-pale);border-radius:8px;padding:10px 12px;font-size:12px;color:var(--black);line-height:1.6;border:1.5px solid transparent}
.notes-summary-box.editing{border-color:var(--olive);background:#fff}
.notes-edit-area,.notes-full-edit{width:100%;border:none;background:transparent;font-family:var(--ff-body);font-size:12px;color:var(--black);line-height:1.6;resize:none;outline:none}
.notes-actions{display:flex;align-items:center;gap:8px;margin-top:5px}
.notes-toggle{background:none;border:none;font-family:var(--ff-body);font-size:11px;color:var(--olive);font-weight:600;cursor:pointer;padding:0}
.notes-edit-btn{background:none;border:none;font-family:var(--ff-body);font-size:11px;color:var(--gray);cursor:pointer;padding:0;margin-left:auto}
.notes-save-btn{background:var(--olive);color:#fff;border:none;border-radius:6px;font-family:var(--ff-body);font-size:11px;font-weight:600;padding:4px 10px;cursor:pointer;margin-left:auto}
.notes-full-box{margin-top:8px;background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;display:none}
.notes-full-box.open{display:block}
.form-grp{margin-bottom:14px}
.form-lbl{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 11px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--ff-body);font-size:15px;color:var(--black);background:#fff;-webkit-appearance:none;appearance:none}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--olive)}
.form-textarea{resize:none;min-height:80px;line-height:1.5}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc-entry{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px}
.sc-entry-hdr{display:grid;grid-template-columns:28px 60px 1fr;background:var(--olive);color:rgba(255,255,255,0.8);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;padding:6px 12px;gap:8px}
.sc-divider{background:var(--olive-pale);padding:5px 12px;font-size:10px;font-weight:700;color:var(--olive);display:flex;justify-content:space-between}
.sc-row{display:grid;grid-template-columns:28px 60px 1fr;align-items:center;padding:6px 12px;border-bottom:1px solid var(--border);gap:6px;background:#fff}
.sc-row:last-child{border-bottom:none}
.sc-row:nth-child(even){background:#FAFAF9}
.sc-hole-num{font-size:13px;font-weight:700;color:var(--olive)}
.par-badge{display:inline-block;padding:1px 5px;border-radius:4px;font-size:10px;font-weight:700}
.pb-3{background:#E3EFF8;color:#1A5C8B}.pb-4{background:var(--olive-pale);color:var(--olive)}.pb-5{background:#F2EBD8;color:#7A5C20}
.sc-mid-col{display:flex;align-items:center}
.sc-right-col{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.sc-inline-grp{display:flex;align-items:center;gap:6px}
.sc-inline-lbl{font-size:9px;font-weight:700;color:var(--gray-lt);text-transform:uppercase;letter-spacing:0.4px;width:34px;text-align:right;flex-shrink:0}
.sc-totals{display:flex;justify-content:space-between;padding:8px 12px;background:var(--olive-pale);font-size:12px;font-weight:600;color:var(--olive)}
.stepper{display:flex;align-items:center}
.step-btn{width:30px;height:30px;border:1.5px solid var(--border);background:#fff;font-size:16px;font-weight:600;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center}
.step-btn:first-child{border-radius:8px 0 0 8px}
.step-btn:last-child{border-radius:0 8px 8px 0}
.step-btn:active{background:var(--olive-pale)}
.step-score{width:36px;height:30px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;border-top:1.5px solid var(--border);border-bottom:1.5px solid var(--border);transition:background 0.12s,color 0.12s}
.putt-row{display:flex;gap:3px}
.putt-btn{width:28px;height:24px;border:1.5px solid var(--border);background:#fff;border-radius:6px;font-size:11px;font-weight:600;color:var(--gray);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.1s}
.putt-btn-sel{border-color:var(--olive);background:var(--olive-pale);color:var(--olive)}
.putt-btn:active{background:var(--olive-pale)}
.ratings9-container{background:#F8F6F2;border-top:1px solid var(--border);border-bottom:1px solid var(--border);padding:10px 12px;display:flex;flex-direction:column;gap:10px}
.rating9-block{}
.rating9-title{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
.rating9-row{display:flex;flex-direction:column;gap:5px}
.rating-btn{flex:1;padding:9px 4px;border:1.5px solid var(--border);border-radius:8px;background:#fff;font-family:var(--ff-body);font-size:14px;font-weight:600;color:var(--gray);cursor:pointer;text-align:center;transition:all 0.12s}
.rating-btn.sel{border-color:var(--olive);background:var(--olive-pale);color:var(--olive)}
.rating-btn-wide{width:100%;padding:9px 12px;font-size:13px;text-align:left;white-space:normal}
.submit-btn{width:100%;padding:15px;background:var(--olive);color:#fff;border:none;border-radius:12px;font-family:var(--ff-title);font-size:22px;letter-spacing:1.5px;cursor:pointer;margin-top:6px}
.submit-btn:active{opacity:0.85}
.summarizing-enter{display:flex;align-items:center;gap:10px;padding:14px;background:var(--olive-pale);border-radius:12px;font-size:13px;color:var(--olive);font-weight:500;margin-top:6px}
.spin{display:inline-block;animation:spin 0.9s linear infinite;font-size:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.nine-avg-card{background:var(--olive-pale);border-radius:8px;padding:12px;text-align:center}
.nine-avg-lbl{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:4px}
.nine-avg-num{font-size:28px;font-weight:700;color:var(--olive);line-height:1}
.nine-avg-par{font-size:11px;color:var(--gray);margin-top:3px}
.hole-tbl-hdr{display:grid;grid-template-columns:36px 36px 1fr 1fr;padding:6px 10px;background:var(--olive);border-radius:8px 8px 0 0;gap:4px}
.hole-tbl-hdr span{font-size:9px;font-weight:700;color:rgba(255,255,255,0.8);text-transform:uppercase;letter-spacing:0.5px;text-align:center}
.hole-tbl-row{display:grid;grid-template-columns:36px 36px 1fr 1fr;padding:7px 10px;border-bottom:1px solid var(--border);gap:4px;align-items:center}
.hole-tbl-row:last-child{border-bottom:none}
.hole-tbl-row:nth-child(even){background:#FAFAF8}
.ht-hole{font-size:13px;font-weight:700;color:var(--olive);text-align:center}
.ht-par{font-size:12px;color:var(--gray);text-align:center}
.ht-avg{font-size:13px;text-align:center}
.ht-putts{font-size:12px;color:var(--gray);text-align:center}
.proc9-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px 6px;align-items:center}
.proc9-hdr{font-size:10px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:0.4px;text-align:center;padding-bottom:4px;border-bottom:1px solid var(--border)}
.proc9-lbl{font-size:12px;font-weight:600;color:var(--gray);padding:6px 0}
.proc9-val{font-size:12px;color:var(--black);text-align:center;background:var(--olive-pale);border-radius:8px;padding:6px 4px;line-height:1.4}
.lb-player-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.lb-player-row:last-child{border-bottom:none;padding-bottom:0}
.lb-rank-badge{width:28px;height:28px;border-radius:50%;background:var(--olive-pale);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--olive);flex-shrink:0;margin-top:2px}
.rank-1{background:var(--gold);color:#fff}.rank-2{background:var(--gray-lt);color:#fff}.rank-3{background:#CD7F32;color:#fff}
.lb-player-info{flex:1;min-width:0}
.lb-player-name{font-size:15px;font-weight:700;color:var(--black);line-height:1}
.lb-player-sub{font-size:11px;color:var(--gray);margin-top:2px}
.lb-stats-row{display:flex;gap:8px;margin-top:7px;flex-wrap:wrap}
.lb-stat{background:var(--olive-pale);border-radius:6px;padding:5px 9px;text-align:center;min-width:44px}
.lb-stat-val{font-size:14px;font-weight:700;color:var(--olive);line-height:1}
.lb-stat-lbl{font-size:8px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.3px;margin-top:2px}
.lb-best{text-align:right;flex-shrink:0}
.lb-best-num{font-family:var(--ff-title);font-size:36px;color:var(--olive);line-height:1;letter-spacing:0.5px}
.lb-best-sub{font-size:10px;color:var(--gray);margin-top:2px}
.lb-me{background:rgba(74,87,64,0.06);border-radius:10px;margin:0 -4px;padding:0 4px}
#login-overlay{position:fixed;inset:0;background:var(--bg);z-index:500;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:0}
#login-overlay.show{display:flex}
.login-logo{height:90px;width:auto;margin-bottom:20px}
.login-title{font-family:var(--ff-title);font-size:48px;color:var(--olive);letter-spacing:2px;line-height:1;margin-bottom:6px}
.login-subtitle{font-size:13px;color:var(--gray);margin-bottom:44px;text-align:center;line-height:1.5}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px 24px;font-family:var(--ff-body);font-size:15px;font-weight:600;color:var(--black);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.08);width:100%;max-width:280px;justify-content:center;transition:transform 0.1s}
.google-btn:active{transform:scale(0.97)}
#profile-overlay{position:fixed;inset:0;background:var(--bg);z-index:400;display:none;flex-direction:column;padding:40px 24px 32px;overflow-y:auto}
#profile-overlay.show{display:flex}
.profile-emoji{font-size:36px;margin-bottom:12px}
.profile-title{font-family:var(--ff-title);font-size:38px;color:var(--olive);letter-spacing:1.5px;margin-bottom:4px}
.profile-sub{font-size:13px;color:var(--gray);margin-bottom:28px;line-height:1.5}
#loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:450;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.loading-emoji{font-size:36px;animation:spin 2s linear infinite}
.loading-txt{font-size:13px;color:var(--gray);font-weight:500}
.toast{position:fixed;bottom:78px;left:50%;transform:translateX(-50%) translateY(12px);background:var(--black);color:#fff;padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;opacity:0;transition:all 0.25s;z-index:999;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:40px 16px;color:var(--gray)}
.empty h3{font-family:var(--ff-title);font-size:22px;letter-spacing:1px;color:var(--olive);margin-bottom:8px}
.empty p{font-size:13px;line-height:1.5}
</style>
</head>
<body>

<div id="loading-overlay">
  <span class="loading-emoji">⛳</span>
  <span class="loading-txt">Loading the Swamp...</span>
</div>

<div id="login-overlay">
  <img class="login-logo" id="loginLogo" src="" alt="Swamp">
  <div class="login-title">SWAMP SHEET</div>
  <div class="login-subtitle">Your personal golf performance tracker.<br>Sign in to get started.</div>
  <button class="google-btn" id="googleSignInBtn">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>

// Set flag images
document.getElementById('loginLogo').src = FLAG_SRC;
document.getElementById('appFlag').src = FLAG_SRC;

// ─── State ───
let currentUser = null, userProfile = null, rounds = [], COURSES = {};
let adminMode = false, es = null, addingCourse = false, newCourse = null;
let expandedRound = null, editingSum = {}, showFull = {}, editingFull = {};
let allRoundsCache = null;

// ─── Auth ───
document.getElementById('googleSignInBtn').onclick = async () => {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { showToast('Sign in failed — try again'); }
};

document.getElementById('signOutBtn').onclick = async () => {
  document.getElementById('userMenu').classList.remove('open');
  await fbSignOut(auth);
};

document.getElementById('userAvatar').onclick = () => {
  document.getElementById('userMenu').classList.toggle('open');
};

document.addEventListener('click', e => {
  const menu = document.getElementById('userMenu');
  if (!menu.contains(e.target) && !document.getElementById('userAvatar').contains(e.target)) {
    menu.classList.remove('open');
  }
});

document.getElementById('adminBtn').onclick = () => {
  adminMode = !adminMode;
  const btn = document.getElementById('adminBtn');
  btn.classList.toggle('active', adminMode);
  btn.textContent = adminMode ? 'ADMIN ON' : 'ADMIN';
  showToast(adminMode ? '🔓 Admin mode on' : '🔒 Admin mode off');
  if (document.getElementById('panel-dashboard').classList.contains('active')) renderDashboard();
};

document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.onclick = () => switchTab(btn.dataset.tab);
});

onAuthStateChanged(auth, async user => {
  if (user) {
    currentUser = user;
    showLoading(true);
    try {
      await loadCourses();
      const hasProfile = await loadUserProfile();
      if (hasProfile) {
        await loadRounds();
        setupApp();
      } else {
        showLoading(false);
        showProfileSetup();
      }
    } catch(e) {
      console.error(e);
      showToast('Error loading — try refreshing');
      showLoading(false);
    }
  } else {
    currentUser = null; userProfile = null; rounds = [];
    showLoading(false);
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-overlay').classList.add('show');
  }
});

// ─── Loading ───
function showLoading(v) {
  document.getElementById('loading-overlay').style.display = v ? 'flex' : 'none';
}

// ─── Profile ───
async function loadUserProfile() {
  const snap = await getDoc(doc(db, 'users', currentUser.uid, 'profile', 'data'));
  if (snap.exists()) { userProfile = snap.data(); return true; }
  return false;
}

function showProfileSetup() {
  document.getElementById('login-overlay').classList.remove('show');
  const sel = document.getElementById('prof-course');
  sel.innerHTML = Object.values(COURSES).map(c => `<option value="${c.id}">${c.name}</option>`).join('');

document.getElementById('saveProfileBtn').onclick = async () => {
  const name = document.getElementById('prof-name').value.trim();
  const hdcp = parseFloat(document.getElementById('prof-hdcp').value) || 0;
  const homeCourse = document.getElementById('prof-course').value;
  if (!name) { showToast('Please enter your name'); return; }
  userProfile = { name, handicap: hdcp, homeCourse, email: currentUser.email };
  await setDoc(doc(db, 'users', currentUser.uid, 'profile', 'data'), userProfile);

// ─── Courses ───
async function loadCourses() {
  const snap = await getDocs(collection(db, 'courses'));
  if (snap.empty) {
    await setDoc(doc(db, 'courses', 'bala'), BALA_SEED);
    COURSES = { bala: { ...BALA_SEED } };
  } else {
    COURSES = {};
    snap.forEach(d => { COURSES[d.id] = d.data(); });
  }
}

// ─── Rounds ───
async function loadRounds() {
  if (!currentUser) return;
  try {
    const q = query(collection(db, 'rounds'), where('userId','==',currentUser.uid), orderBy('timestamp','asc'));
    const snap = await getDocs(q);
    rounds = []; snap.forEach(d => rounds.push(d.data()));
  } catch(e) {
    // Fallback if composite index not yet created
    const snap = await getDocs(collection(db, 'rounds'));
    rounds = [];
    snap.forEach(d => { if (d.data().userId === currentUser.uid) rounds.push(d.data()); });
    rounds.sort((a,b) => a.timestamp - b.timestamp);
  }
}

async function saveRoundToFirebase(r) {
  await setDoc(doc(db, 'rounds', r.id), r);
}

// ─── App Setup ───
function setupApp() {
  showLoading(false);
  document.getElementById('login-overlay').classList.remove('show');
  document.getElementById('app').style.display = 'flex';
  const av = document.getElementById('userAvatar');
  if (currentUser.photoURL) av.innerHTML = `<img src="${currentUser.photoURL}" alt="">`;
  else av.textContent = (userProfile?.name || 'U').charAt(0).toUpperCase();
  document.getElementById('menuName').textContent = userProfile?.name || 'Player';
  document.getElementById('menuHdcp').textContent = `Handicap: ${userProfile?.handicap ?? '—'}`;
  es = freshES();
  switchTab('dashboard');
}

// ─── Helpers ───
function freshES() {
  const cid = userProfile?.homeCourse || 'bala';
  const c = COURSES[cid] || Object.values(COURSES)[0] || BALA_SEED;
  return { course:c.id, date:new Date().toISOString().split('T')[0], conditions:'',
    scores:[...c.holes], putts:new Array(18).fill(2),
    psrFront:null,psrBack:null,tempoFront:null,tempoBack:null,notes:'',summarizing:false };
}
function freshNewCourse() { return { id:'',name:'',shortName:'',par:72,rating:72.0,slope:113,holes:new Array(18).fill(4) }; }
function scoreCls(s,p) { const d=s-p; if(d<=-2)return 's-eagle';if(d===-1)return 's-birdie';if(d===0)return 's-par';if(d===1)return 's-bogey';if(d===2)return 's-double';return 's-worse'; }
function stepStyle(s,p) { const d=s-p; if(d<=-2)return 'background:#D4A017;color:#fff';if(d===-1)return 'background:#4A5740;color:#fff';if(d===0)return 'background:#F0EEEA;color:#555';if(d===1)return 'background:#FDECEA;color:#C0392B';if(d===2)return 'background:#C0392B;color:#fff';return 'background:#8B1A1A;color:#fff'; }
function fmtDate(ds) { const d=new Date(ds+'T12:00:00'); return { day:d.getDate(), mon:d.toLocaleString('en',{month:'short'}), full:d.toLocaleDateString('en',{month:'long',day:'numeric',year:'numeric'}) }; }
function totalScore(r) { return r.scores.reduce((a,b)=>a+b,0); }
function overPar(r) { return totalScore(r)-(COURSES[r.course]?.par||68); }
function netScore(r) { return totalScore(r)-Math.round(r.handicap||0); }
function totalPutts(r) { return r.putts?r.putts.reduce((a,b)=>a+(b>=4?4:b),0):0; }
function threePuttCount(r) { return r.putts?r.putts.filter(p=>p>=3).length:(r.threePutts||0); }
function avgProcess(rs,f1,f2) { const v=rs.flatMap(r=>[r[f1],r[f2]].filter(Boolean)); return v.length?v.reduce((a,b)=>a+b,0)/v.length:null; }
function labelForVal(labels,val) { if(!val)return null; return labels[val-1]; }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }

// ─── Tab Switching ───
function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  if(tab==='dashboard') renderDashboard();
  if(tab==='enter') renderEnterRound();
  if(tab==='stats') renderStats();
  if(tab==='leaderboard') renderLeaderboard();
}

// ─── Dashboard ───
function renderDashboard() {
  const panel = document.getElementById('panel-dashboard');
  if (!rounds.length) { panel.innerHTML='<div class="empty"><h3>The Swamp Awaits</h3><p>Tap <strong>+ Round</strong> to log your first round.</p></div>'; return; }
  const scores=rounds.map(totalScore);
  const best=Math.min(...scores), bestR=rounds.find(r=>totalScore(r)===best);
  const bd=fmtDate(bestR.date), toGo=best-70;
  const avg=(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
  const avgPu=(rounds.map(r=>threePuttCount(r)).reduce((a,b)=>a+b,0)/rounds.length).toFixed(1);
  const aPSR=avgProcess(rounds,'psrFront','psrBack'), aT=avgProcess(rounds,'tempoFront','tempoBack');
  const aPSRd=aPSR?labelForVal(PSR_LABELS,Math.round(aPSR)):null;
  const aTd=aT?labelForVal(TEMPO_LABELS,Math.round(aT)):null;
  const chrono=[...rounds].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const last2=chrono.slice(-2);
  const l2Avg=last2.length>1?(last2.map(totalScore).reduce((a,b)=>a+b,0)/last2.length).toFixed(1):null;
  const sorted=[...rounds].sort((a,b)=>new Date(b.date)-new Date(a.date));

  let h=`<div class="stat-grid">
    <div class="stat-card"><span class="stat-lbl">Rounds</span><span class="stat-val">${rounds.length}</span></div>
    <div class="stat-card"><span class="stat-lbl">Avg Score</span><span class="stat-val">${avg}</span></div>
    <div class="stat-card"><span class="stat-lbl">Avg 3-Putts</span><span class="stat-val">${avgPu}</span></div>
    <div class="stat-card"><span class="stat-lbl">Pre-Shot</span><span class="${aPSRd?'stat-emoji':'stat-val stat-na'}">${aPSRd||'—'}</span></div>
    <div class="stat-card"><span class="stat-lbl">Tempo</span><span class="${aTd?'stat-emoji':'stat-val stat-na'}">${aTd||'—'}</span></div>
    <div class="stat-card"><span class="stat-lbl">Best Round</span><span class="stat-val">${best}</span></div>
  </div>`;

  h+=`<div class="goal-card">
    <div class="goal-left"><div class="goal-lbl">Best Round</div>
      <div class="goal-score">${best}</div>
      <div class="goal-date">${bd.full}</div>
      ${l2Avg?`<div class="goal-avg">Last 2 avg: ${l2Avg}</div>`:''}
    </div>
    <div class="goal-divider"></div>
    <div class="goal-right">
      <div class="goal-to-go-num">${toGo>0?toGo:'🎉'}</div>
      <div class="goal-to-go-lbl">${toGo>0?'to reach 70':'Goal hit!'}</div>
      <div class="goal-to-go-sub">Goal: shoot 70</div>
    </div>
  </div>`;

  h+='<div class="card"><div class="section-title">Recent Rounds</div>';
  sorted.forEach(r => {
    const d=fmtDate(r.date),score=totalScore(r),op=overPar(r);
    const opStr=op>=0?'+'+op:String(op),isExp=expandedRound===r.id;
    const cname=COURSES[r.course]?.shortName||r.course;
    h+=`<div class="round-row" onclick="toggleRound('${r.id}')">
      <div class="round-date"><div class="r-day">${d.day}</div><div class="r-mon">${d.mon}</div></div>
      <div class="round-info">
        <div class="r-course-nm">${cname}</div>
        <div class="r-over-lg ${op>0?'over-red':'over-green'}">${opStr}</div>
        <div class="r-net-lbl">Net ${netScore(r)}</div>
      </div>
      <div class="round-score"><div class="r-gross">${score}</div></div>
    </div>`;
    if(isExp) {
      const holes=COURSES[r.course]?.holes||new Array(18).fill(4);
      h+='<div><div class="sc-mini">';
      for(let i=0;i<18;i++) h+=`<div class="sc-cell"><div class="sc-h">H${i+1}</div><div class="sc-s ${scoreCls(r.scores[i],holes[i])}">${r.scores[i]}</div><div class="sc-p">P${holes[i]}</div></div>`;
      h+='</div>';
      const pars=r.scores.filter((s,i)=>s===holes[i]).length;
      const bogs=r.scores.filter((s,i)=>s-holes[i]===1).length;
      const dubs=r.scores.filter((s,i)=>s-holes[i]===2).length;
      const birds=r.scores.filter((s,i)=>s-holes[i]===-1).length;
      const tp=threePuttCount(r),tpt=r.putts?totalPutts(r):null;
      const psrFE=r.psrFront?labelForVal(PSR_LABELS,r.psrFront):'?';
      const psrBE=r.psrBack?labelForVal(PSR_LABELS,r.psrBack):'?';
      const tFE=r.tempoFront?labelForVal(TEMPO_LABELS,r.tempoFront):'?';
      const tBE=r.tempoBack?labelForVal(TEMPO_LABELS,r.tempoBack):'?';
      h+=`<div class="round-meta">
        ${birds>0?`<span>🎯 ${birds} birdie${birds!==1?'s':''}</span>`:''}
        <span>⚪ ${pars} par${pars!==1?'s':''}</span>
        <span>🟠 ${bogs} bogey${bogs!==1?'s':''}</span>
        ${dubs>0?`<span>🔴 ${dubs} double${dubs!==1?'s':''}</span>`:''}
        <span>🔵 ${tp} 3-putt${tp!==1?'s':''}</span>
        ${tpt!==null?`<span>⛳ ${tpt} putts</span>`:''}
      </div>`;
      if(r.psrFront||r.psrBack||r.tempoFront||r.tempoBack) {
        h+=`<div class="process-mini">
          ${(r.psrFront||r.psrBack)?`<div class="process-mini-row"><span class="process-mini-lbl">🧠 Pre-Shot</span><span class="process-mini-val">F: ${psrFE}</span><span class="process-mini-val">B: ${psrBE}</span></div>`:''}
          ${(r.tempoFront||r.tempoBack)?`<div class="process-mini-row"><span class="process-mini-lbl">⏱ Tempo</span><span class="process-mini-val">F: ${tFE}</span><span class="process-mini-val">B: ${tBE}</span></div>`:''}
        </div>`;
      }
      h+=buildNotesHTML(r);
      if(adminMode) h+=`<div style="margin-top:8px"><button onclick="confirmDelete('${r.id}')" style="background:none;border:1px solid var(--red);color:var(--red);border-radius:6px;padding:5px 12px;font-family:var(--ff-body);font-size:11px;font-weight:600;cursor:pointer">🗑 Delete Round</button></div>`;
      h+='</div>';
    }
  });
  h+='</div>';
  panel.innerHTML=h;
}

window.toggleRound = id => { expandedRound=expandedRound===id?null:id; renderDashboard(); };
window.confirmDelete = async id => {
  if(!adminMode)return;
  if(!confirm('Delete this round? This cannot be undone.'))return;
  await deleteDoc(doc(db,'rounds',id));
  rounds=rounds.filter(r=>r.id!==id);
  allRoundsCache=null;
  renderDashboard();
  showToast('Round deleted');
};

// ─── Notes ───
function buildNotesHTML(r) {
  const sumText=r.summary||r.notes||'', fullText=r.transcript||'';
  if(!sumText&&!fullText)return '';
  const isES=editingSum[r.id],isSF=showFull[r.id],isEF=editingFull[r.id];
  let h='<div class="notes-section">';
  if(isES) {
    h+=`<div class="notes-summary-box editing"><textarea class="notes-edit-area" id="sum-${r.id}" rows="5">${sumText}</textarea></div>
        <div class="notes-actions"><button class="notes-toggle" onclick="cancelES('${r.id}')">Cancel</button><button class="notes-save-btn" onclick="saveSum('${r.id}')">Save</button></div>`;
  } else {
    h+=`<div class="notes-summary-box">${sumText}</div>
        <div class="notes-actions">
          ${fullText?`<button class="notes-toggle" onclick="toggleFull('${r.id}')">${isSF?'▲ Hide transcript':'▾ Full transcript'}</button>`:''}
          <button class="notes-edit-btn" onclick="startES('${r.id}')">✎ Edit summary</button>
        </div>`;
  }
  if(fullText) {
    h+=`<div class="notes-full-box${isSF?' open':''}">`;
    if(isEF) h+=`<textarea class="notes-full-edit" id="full-${r.id}" rows="8">${fullText}</textarea><div class="notes-actions" style="margin-top:6px"><button class="notes-toggle" onclick="cancelEF('${r.id}')">Cancel</button><button class="notes-save-btn" onclick="saveFull('${r.id}')">Save</button></div>`;
    else h+=`<div style="white-space:pre-wrap;font-size:11px;line-height:1.6;color:#6B6B6B">${fullText}</div><div class="notes-actions" style="margin-top:6px"><button class="notes-edit-btn" onclick="startEF('${r.id}')">✎ Edit transcript</button></div>`;
    h+='</div>';
  }
  return h+'</div>';
}
window.toggleFull=id=>{showFull[id]=!showFull[id];renderDashboard();};
window.startES=id=>{editingSum[id]=true;renderDashboard();};
window.cancelES=id=>{editingSum[id]=false;renderDashboard();};
window.startEF=id=>{editingFull[id]=true;renderDashboard();};
window.cancelEF=id=>{editingFull[id]=false;renderDashboard();};
window.saveSum=async id=>{const el=document.getElementById('sum-'+id);if(!el)return;const idx=rounds.findIndex(r=>r.id===id);if(idx>=0){rounds[idx].summary=el.value;await saveRoundToFirebase(rounds[idx]);}editingSum[id]=false;renderDashboard();};
window.saveFull=async id=>{const el=document.getElementById('full-'+id);if(!el)return;const idx=rounds.findIndex(r=>r.id===id);if(idx>=0){rounds[idx].transcript=el.value;await saveRoundToFirebase(rounds[idx]);}editingFull[id]=false;renderDashboard();};

// ─── Enter Round ───
function renderEnterRound() {
  if(!es)es=freshES();
  const panel=document.getElementById('panel-enter');
  if(addingCourse){renderAddCourse(panel);return;}
  const course=COURSES[es.course],holes=course.holes;
  const front=es.scores.slice(0,9).reduce((a,b)=>a+b,0),back=es.scores.slice(9).reduce((a,b)=>a+b,0),total=front+back;
  const fP=holes.slice(0,9).reduce((a,b)=>a+b,0),bP=holes.slice(9).reduce((a,b)=>a+b,0);
  const fO=front-fP,bO=back-bP,tO=total-course.par;
  let courseOpts=Object.values(COURSES).map(c=>`<option value="${c.id}"${es.course===c.id?' selected':''}>${c.name}</option>`).join('');
  if(adminMode) courseOpts+='<option value="__add__">+ Add new course...</option>';
  const scRow=i=>{
    const par=holes[i],score=es.scores[i],putts=es.putts[i];
    const pbCls=par===3?'pb-3':par===4?'pb-4':'pb-5';
    const puttBtns=[0,1,2,3,4].map(v=>`<button class="putt-btn${putts===v?' putt-btn-sel':''}" onclick="setPutts(${i},${v})">${v===4?'4+':v}</button>`).join('');
    return `<div class="sc-row"><div class="sc-hole-num">${i+1}</div><div class="sc-mid-col"><span class="par-badge ${pbCls}">Par ${par}</span></div><div class="sc-right-col"><div class="sc-inline-grp"><span class="sc-inline-lbl">Score</span><div class="stepper"><button class="step-btn" onclick="adjScore(${i},-1)">−</button><div class="step-score" id="ss-${i}" style="${stepStyle(score,par)}">${score}</div><button class="step-btn" onclick="adjScore(${i},1)">+</button></div></div><div class="sc-inline-grp"><span class="sc-inline-lbl">Putts</span><div class="putt-row">${puttBtns}</div></div></div></div>`;
  };
  const rBlock=(f9,labels,title,val)=>`<div class="rating9-block"><div class="rating9-title">${title}</div><div class="rating9-row">${labels.map((lbl,i)=>`<button class="${val===(i+1)?'rating-btn sel':'rating-btn'} rating-btn-wide" onclick="setRating9('${f9}',${i+1})">${lbl}</button>`).join('')}</div></div>`;
  let h=`<div class="card" style="margin-bottom:11px"><div class="form-row"><div class="form-grp" style="margin-bottom:0"><label class="form-lbl">Course</label><select class="form-select" onchange="handleCourseChange(this.value)">${courseOpts}</select></div><div class="form-grp" style="margin-bottom:0"><label class="form-lbl">Date</label><input class="form-input" type="date" value="${es.date}" onchange="es.date=this.value"></div></div><div class="form-grp" style="margin-top:12px;margin-bottom:0"><label class="form-lbl">Conditions</label><input class="form-input" type="text" id="es-cond" placeholder="e.g. 68°F, light wind" value="${es.conditions}"></div></div>`;
  h+=`<div class="card" style="margin-bottom:11px"><div class="form-grp" style="margin-bottom:0"><label class="form-lbl">Notes / Voice Transcript</label><textarea class="form-textarea" id="es-notes" placeholder="Paste voice memo transcript — Claude will take it from there." style="min-height:72px">${es.notes}</textarea></div></div>`;
  h+=`<div class="sc-entry"><div class="sc-entry-hdr"><span>Hole</span><span>Par</span><span></span></div><div class="sc-divider"><span>FRONT 9</span><span id="front-tot">${front} (${fO>=0?'+'+fO:fO})</span></div>${[0,1,2,3,4,5,6,7,8].map(scRow).join('')}<div class="ratings9-container">${rBlock('psrFront',PSR_LABELS,'🧠 Pre-Shot Routine — Front 9',es.psrFront)}${rBlock('tempoFront',TEMPO_LABELS,'⏱ Tempo — Front 9',es.tempoFront)}</div><div class="sc-divider"><span>BACK 9</span><span id="back-tot">${back} (${bO>=0?'+'+bO:bO})</span></div>${[9,10,11,12,13,14,15,16,17].map(scRow).join('')}<div class="ratings9-container">${rBlock('psrBack',PSR_LABELS,'🧠 Pre-Shot Routine — Back 9',es.psrBack)}${rBlock('tempoBack',TEMPO_LABELS,'⏱ Tempo — Back 9',es.tempoBack)}</div><div class="sc-totals"><span>TOTAL</span><span id="total-score">${total} (${tO>=0?'+'+tO:tO})</span></div></div>`;
  h+=es.summarizing?'<div class="summarizing-enter"><span class="spin">↻</span> Summarizing with Claude...</div>':'<button class="submit-btn" onclick="saveRound()">Save Round</button>';
  h+='<div style="height:24px"></div>';
  panel.innerHTML=h;
  document.getElementById('courseSubtitle').textContent=course.name;
}

function renderAddCourse(panel) {
  if(!newCourse)newCourse=freshNewCourse();
  const holeInputs=Array.from({length:18},(_,i)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:6px"><span style="font-size:12px;color:var(--gray);width:48px">Hole ${i+1}</span><select class="form-select" style="flex:1;padding:6px 8px;font-size:13px" onchange="newCourse.holes[${i}]=parseInt(this.value)"><option value="3"${newCourse.holes[i]===3?' selected':''}>Par 3</option><option value="4"${newCourse.holes[i]===4?' selected':''}>Par 4</option><option value="5"${newCourse.holes[i]===5?' selected':''}>Par 5</option></select></div>`).join('');
  panel.innerHTML=`<div class="card"><div class="section-title">Add New Course</div><div class="form-grp"><label class="form-lbl">Course Name</label><input class="form-input" id="nc-name" placeholder="e.g. Cobbs Creek Golf Club" value="${newCourse.name}" oninput="newCourse.name=this.value;newCourse.id=this.value.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20)"></div><div class="form-row"><div class="form-grp"><label class="form-lbl">Rating</label><input class="form-input" type="number" step="0.1" value="${newCourse.rating}" oninput="newCourse.rating=parseFloat(this.value)||72.0"></div><div class="form-grp"><label class="form-lbl">Slope</label><input class="form-input" type="number" value="${newCourse.slope}" oninput="newCourse.slope=parseInt(this.value)||113"></div></div><div class="form-grp"><label class="form-lbl">Hole Pars</label><div style="max-height:320px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:10px">${holeInputs}</div></div><div style="display:flex;gap:10px;margin-top:4px"><button class="submit-btn" style="background:var(--gray-lt)" onclick="cancelAddCourse()">Cancel</button><button class="submit-btn" onclick="saveCourse()">Save Course</button></div></div><div style="height:24px"></div>`;
}

window.handleCourseChange=val=>{if(val==='__add__'){addingCourse=true;newCourse=freshNewCourse();renderEnterRound();return;}es.course=val;es.scores=[...COURSES[val].holes];es.putts=new Array(18).fill(2);document.getElementById('courseSubtitle').textContent=COURSES[val].name;renderEnterRound();};
window.cancelAddCourse=()=>{addingCourse=false;newCourse=null;renderEnterRound();};
window.saveCourse=async()=>{
  if(!newCourse||!newCourse.name.trim()){showToast('Enter a course name');return;}
  if(!newCourse.id)newCourse.id=newCourse.name.toLowerCase().replace(/[^a-z0-9]/g,'_').slice(0,20);
  newCourse.shortName=newCourse.name.split(' ')[0];
  newCourse.par=newCourse.holes.reduce((a,b)=>a+b,0);
  await setDoc(doc(db,'courses',newCourse.id),{...newCourse});
  COURSES[newCourse.id]={...newCourse};
  es.course=newCourse.id;es.scores=[...newCourse.holes];es.putts=new Array(18).fill(2);
  addingCourse=false;newCourse=null;
  showToast('Course saved! ⛳');renderEnterRound();
};
window.adjScore=(i,delta)=>{const par=COURSES[es.course].holes[i];es.scores[i]=Math.max(1,Math.min(12,es.scores[i]+delta));const cell=document.getElementById('ss-'+i);if(cell){cell.textContent=es.scores[i];cell.style.cssText=stepStyle(es.scores[i],par);}updateTotals();};
window.setPutts=(i,v)=>{es.putts[i]=v;renderEnterRound();};
window.setRating9=(f,v)=>{es[f]=v;renderEnterRound();};
function updateTotals(){const c=COURSES[es.course],h=c.holes;const f=es.scores.slice(0,9).reduce((a,b)=>a+b,0),bk=es.scores.slice(9).reduce((a,b)=>a+b,0),t=f+bk;const fP=h.slice(0,9).reduce((a,b)=>a+b,0),bP=h.slice(9).reduce((a,b)=>a+b,0);const fO=f-fP,bO=bk-bP,tO=t-c.par;const fe=document.getElementById('front-tot'),be=document.getElementById('back-tot'),te=document.getElementById('total-score');if(fe)fe.textContent=`${f} (${fO>=0?'+'+fO:fO})`;if(be)be.textContent=`${bk} (${bO>=0?'+'+bO:bO})`;if(te)te.textContent=`${t} (${tO>=0?'+'+tO:tO})`;}
async function summarize(text){const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:'You are a golf caddy reviewing a post-round voice memo. Summarize in exactly 5-7 concise sentences. Focus on what worked, what did not, key moments, and one clear takeaway. Write in second person. Be specific and direct, no filler.\n\nNotes:\n'+text}]})});const data=await resp.json();return data.content?.[0]?.text||text;}
window.saveRound=async()=>{
  const condEl=document.getElementById('es-cond'),notesEl=document.getElementById('es-notes');
  const rawNotes=notesEl?notesEl.value.trim():'';
  if(condEl)es.conditions=condEl.value;
  const score=es.scores.reduce((a,b)=>a+b,0),course=COURSES[es.course];
  if(score<course.par-10||score>course.par+50){showToast('Check scores before saving');return;}
  let summary=rawNotes,transcript='';
  if(rawNotes.length>150){es.summarizing=true;renderEnterRound();try{summary=await summarize(rawNotes);transcript=rawNotes;}catch(e){summary=rawNotes;showToast('Could not summarize — saving full notes');}es.summarizing=false;}
  const r={id:'r_'+Date.now(),userId:currentUser.uid,userName:userProfile?.name||'Player',date:es.date,course:es.course,conditions:es.conditions,scores:[...es.scores],putts:[...es.putts],threePutts:es.putts.filter(p=>p>=3).length,psrFront:es.psrFront,psrBack:es.psrBack,tempoFront:es.tempoFront,tempoBack:es.tempoBack,summary,transcript,handicap:userProfile?.handicap||0,timestamp:Date.now()};
  await saveRoundToFirebase(r);
  rounds.push(r);allRoundsCache=null;es=freshES();
  const op=score-course.par;
  showToast(`Saved! ${op>=0?'+'+op:op} at ${course.shortName}`);
  setTimeout(()=>switchTab('dashboard'),700);
};

// ─── Stats ───
function renderStats(){
  const panel=document.getElementById('panel-stats');
  if(!rounds.length){panel.innerHTML='<div class="empty"><h3>No Data Yet</h3><p>Add rounds to see stats.</p></div>';return;}
  const balaRounds=rounds.filter(r=>r.course==='bala');
  const useRounds=balaRounds.length?balaRounds:rounds;
  const refC=COURSES[useRounds[0].course]||BALA_SEED,h=refC.holes;
  const fA=(useRounds.reduce((s,r)=>s+r.scores.slice(0,9).reduce((a,b)=>a+b,0),0)/useRounds.length).toFixed(1);
  const bA=(useRounds.reduce((s,r)=>s+r.scores.slice(9).reduce((a,b)=>a+b,0),0)/useRounds.length).toFixed(1);
  const fP=h.slice(0,9).reduce((a,b)=>a+b,0),bP=h.slice(9).reduce((a,b)=>a+b,0);
  const hA=h.map((par,i)=>{const avg=useRounds.reduce((s,r)=>s+r.scores[i],0)/useRounds.length;const rwP=useRounds.filter(r=>r.putts&&r.putts[i]!==undefined);const avgP=rwP.length?rwP.reduce((s,r)=>s+(r.putts[i]>=4?4:r.putts[i]),0)/rwP.length:null;return{hole:i+1,par,avgScore:avg,avgPutts:avgP};});
  const chrono=[...useRounds].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const psrFV=rounds.map(r=>r.psrFront).filter(Boolean),psrBV=rounds.map(r=>r.psrBack).filter(Boolean);
  const tFV=rounds.map(r=>r.tempoFront).filter(Boolean),tBV=rounds.map(r=>r.tempoBack).filter(Boolean);
  const aPSRF=psrFV.length?psrFV.reduce((a,b)=>a+b,0)/psrFV.length:null;
  const aPSRB=psrBV.length?psrBV.reduce((a,b)=>a+b,0)/psrBV.length:null;
  const aTF=tFV.length?tFV.reduce((a,b)=>a+b,0)/tFV.length:null;
  const aTB=tBV.length?tBV.reduce((a,b)=>a+b,0)/tBV.length:null;
  let out=`<div class="card"><div class="section-title">Score Averages</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px"><div class="nine-avg-card"><div class="nine-avg-lbl">Front 9 Avg</div><div class="nine-avg-num">${fA}</div><div class="nine-avg-par">Par ${fP}</div></div><div class="nine-avg-card"><div class="nine-avg-lbl">Back 9 Avg</div><div class="nine-avg-num">${bA}</div><div class="nine-avg-par">Par ${bP}</div></div></div>`;
  if(chrono.length>=2){const sv=chrono.map(totalScore),minS=Math.min(...sv,70)-1,maxS=Math.max(...sv)+1;const W=320,H=80,pad=8,xStep=(W-pad*2)/(sv.length-1),yScale=(H-pad*2)/(maxS-minS);const pts=sv.map((s,i)=>({x:pad+i*xStep,y:H-pad-(s-minS)*yScale,s}));const goalY=H-pad-(70-minS)*yScale;let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:80px">`;if(goalY>=0&&goalY<=H){svg+=`<line x1="${pad}" y1="${goalY}" x2="${W-pad}" y2="${goalY}" stroke="#D4A017" stroke-width="1" stroke-dasharray="4,3" opacity="0.7"/>`;svg+=`<text x="${W-pad-2}" y="${goalY-3}" fill="#D4A017" font-size="8" text-anchor="end" opacity="0.9">70</text>`;}svg+=`<polyline points="${pts.map(p=>`${p.x},${p.y}`).join(' ')}" fill="none" stroke="#4A5740" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;pts.forEach((p,i)=>{const d=fmtDate(chrono[i].date);svg+=`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#4A5740"/>`;svg+=`<text x="${p.x}" y="${p.y-7}" fill="#1C1C1C" font-size="9" text-anchor="middle" font-weight="600">${p.s}</text>`;svg+=`<text x="${p.x}" y="${H-1}" fill="#A8A8A8" font-size="7.5" text-anchor="middle">${d.day} ${d.mon}</text>`;});svg+='</svg>';out+=`<div style="margin-top:4px"><div style="font-size:10px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px">Score Trend</div>${svg}</div>`;}
  out+='</div>';
  out+=`<div class="card"><div class="section-title">By Hole</div><div class="hole-tbl-hdr"><span>Hole</span><span>Par</span><span>Avg Score</span><span>Avg Putts</span></div>`;
  hA.forEach(x=>{const d=x.avgScore-x.par;let sc='var(--black)';if(d<0)sc='var(--olive)';else if(d>1.2)sc='var(--red)';else if(d>0.5)sc='#C87050';out+=`<div class="hole-tbl-row"><span class="ht-hole">${x.hole}</span><span class="ht-par">${x.par}</span><span class="ht-avg" style="color:${sc};font-weight:700">${x.avgScore.toFixed(2)}</span><span class="ht-putts">${x.avgPutts!==null?x.avgPutts.toFixed(2):'—'}</span></div>`;});
  out+='</div>';
  if(aPSRF||aPSRB||aTF||aTB){const pFD=aPSRF?labelForVal(PSR_LABELS,Math.round(aPSRF)):null,pBD=aPSRB?labelForVal(PSR_LABELS,Math.round(aPSRB)):null,tFD=aTF?labelForVal(TEMPO_LABELS,Math.round(aTF)):null,tBD=aTB?labelForVal(TEMPO_LABELS,Math.round(aTB)):null;out+=`<div class="card"><div class="section-title">Process by 9</div><div class="proc9-grid"><div class="proc9-hdr"></div><div class="proc9-hdr">Front 9</div><div class="proc9-hdr">Back 9</div><div class="proc9-lbl">🧠 Pre-Shot</div><div class="proc9-val">${pFD||'—'}</div><div class="proc9-val">${pBD||'—'}</div><div class="proc9-lbl">⏱ Tempo</div><div class="proc9-val">${tFD||'—'}</div><div class="proc9-val">${tBD||'—'}</div></div></div>`;}
  panel.innerHTML=out;
}

// ─── Leaderboard ───
async function renderLeaderboard(){
  const panel=document.getElementById('panel-leaderboard');
  panel.innerHTML='<div class="empty"><span style="font-size:28px">⏳</span><p style="margin-top:8px">Loading leaderboard...</p></div>';
  try{
    if(!allRoundsCache){const snap=await getDocs(collection(db,'rounds'));allRoundsCache=[];snap.forEach(d=>allRoundsCache.push(d.data()));}
    if(!allRoundsCache.length){panel.innerHTML='<div class="empty"><h3>No Data Yet</h3><p>Rounds will appear here once logged.</p></div>';return;}
    const byUser={};
    allRoundsCache.forEach(r=>{if(!byUser[r.userId])byUser[r.userId]={name:r.userName||'Player',rounds:[]};byUser[r.userId].rounds.push(r);});
    const stats=Object.entries(byUser).map(([uid,data])=>{
      const rs=data.rounds,scores=rs.map(totalScore),best=Math.min(...scores),bestR=rs.find(r=>totalScore(r)===best);
      const avg=(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1);
      const avgTP=(rs.map(r=>threePuttCount(r)).reduce((a,b)=>a+b,0)/rs.length).toFixed(1);
      const psrA=avgProcess(rs,'psrFront','psrBack'),tA=avgProcess(rs,'tempoFront','tempoBack');
      return{uid,name:data.name,rounds:rs.length,best,bestR,avg,avgTP,
        psrEmoji:psrA?labelForVal(PSR_LABELS,Math.round(psrA))?.split(' ')[0]:null,
        tempoEmoji:tA?labelForVal(TEMPO_LABELS,Math.round(tA))?.split(' ')[0]:null,
        isMe:uid===currentUser.uid};
    }).sort((a,b)=>a.best-b.best);
    let out='<div class="section-title" style="padding:0 2px 8px">Leaderboard</div><div class="card" style="padding:10px 14px">';
    stats.forEach((u,idx)=>{
      const bd=fmtDate(u.bestR.date),cname=COURSES[u.bestR.course]?.shortName||u.bestR.course;
      const rCls=idx===0?'rank-1':idx===1?'rank-2':idx===2?'rank-3':'';
      out+=`<div class="lb-player-row${u.isMe?' lb-me':''}">
        <div class="lb-rank-badge ${rCls}">${idx+1}</div>
        <div class="lb-player-info">
          <div class="lb-player-name">${u.name}${u.isMe?' <span style="font-size:10px;color:var(--olive);font-weight:400">(you)</span>':''}</div>
          <div class="lb-player-sub">${u.rounds} round${u.rounds!==1?'s':''} · Avg ${u.avg}</div>
          <div class="lb-stats-row">
            <div class="lb-stat"><div class="lb-stat-val">${u.avgTP}</div><div class="lb-stat-lbl">3-Putts</div></div>
            ${u.psrEmoji?`<div class="lb-stat"><div class="lb-stat-val">${u.psrEmoji}</div><div class="lb-stat-lbl">Pre-Shot</div></div>`:''}
            ${u.tempoEmoji?`<div class="lb-stat"><div class="lb-stat-val">${u.tempoEmoji}</div><div class="lb-stat-lbl">Tempo</div></div>`:''}
          </div>
        </div>
        <div class="lb-best">
          <div class="lb-best-num">${u.best}</div>
          <div class="lb-best-sub">${cname} · ${bd.mon} ${bd.day}</div>
        </div>
      </div>`;
    });
    out+='</div>';
    panel.innerHTML=out;
  }catch(e){console.error(e);panel.innerHTML='<div class="empty"><h3>Couldn\'t load</h3><p>Check your connection and try again.</p></div>';}
}
</script>
